<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d0d;
      --surface:  #141414;
      --gold:     #c9a84c;
      --gold-dim: #8a6f2e;
      --text:     #f0ece3;
      --muted:    #7a7570;
      --line:     rgba(201,168,76,0.18);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ambient glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(201,168,76,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 80%, rgba(201,168,76,0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    /* thin horizontal rule at top */
    .top-rule {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .container {
      text-align: center;
      padding: 2rem;
      animation: fadeUp 1.1s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .eyebrow {
      font-family: 'Inter', sans-serif;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 1s 0.2s cubic-bezier(.22,1,.36,1) forwards;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 8vw, 6rem);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.01em;
      color: var(--text);
      opacity: 0;
      animation: fadeUp 1s 0.35s cubic-bezier(.22,1,.36,1) forwards;
    }

    h1 em {
      font-style: italic;
      color: var(--gold);
    }

    .divider {
      width: 48px;
      height: 1px;
      background: var(--gold-dim);
      margin: 2rem auto;
      opacity: 0;
      animation: fadeUp 1s 0.5s cubic-bezier(.22,1,.36,1) forwards;
    }

    .subtitle {
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.04em;
      line-height: 1.7;
      max-width: 340px;
      margin: 0 auto 2.8rem;
      opacity: 0;
      animation: fadeUp 1s 0.6s cubic-bezier(.22,1,.36,1) forwards;
    }

    .cta {
      display: inline-block;
      padding: 0.75rem 2.2rem;
      border: 1px solid var(--gold-dim);
      color: var(--gold);
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      transition: background 0.25s, color 0.25s, border-color 0.25s;
      opacity: 0;
      animation: fadeUp 1s 0.75s cubic-bezier(.22,1,.36,1) forwards;
    }

    .cta:hover {
      background: var(--gold);
      color: var(--bg);
      border-color: var(--gold);
    }

    /* decorative corner marks */
    .corner {
      position: fixed;
      width: 24px;
      height: 24px;
      border-color: var(--line);
      border-style: solid;
      opacity: 0;
      animation: fadeIn 1.2s 0.9s ease forwards;
    }
    .corner.tl { top: 24px; left: 24px; border-width: 1px 0 0 1px; }
    .corner.tr { top: 24px; right: 24px; border-width: 1px 1px 0 0; }
    .corner.bl { bottom: 24px; left: 24px; border-width: 0 0 1px 1px; }
    .corner.br { bottom: 24px; right: 24px; border-width: 0 1px 1px 0; }

    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="top-rule"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="container">
    <p class="eyebrow">Est. 2024 &nbsp;·&nbsp; Visual Collection</p>
    <h1>Welcome to<br><em>My Gallery</em></h1>
    <div class="divider"></div>
    <p class="subtitle">A curated space where every image tells a story. Explore the collection and find what moves you.</p>
    <a href="https://andi.mhr.my.id" class="cta">Enter Gallery</a>
  </div>
</body>
</html>
